name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -q

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiSeedCracker-${{ github.sha }}
          path: target/AntiSeedCracker-*.jar
          retention-days: 30
